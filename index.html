<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emacity Model United Nations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme {
                extend: {
                    fontFamily: {
                        serif: ['Cinzel', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#030712] text-slate-100 font-sans antialiased overflow-x-hidden selection:bg-amber-500/30 selection:text-amber-200">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#030712]/80 backdrop-blur-md border-b border-blue-950/40 px-6 py-4 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Emacity MUN Logo" class="w-8 h-8 object-contain">
                <span class="font-serif tracking-widest text-sm font-bold text-slate-200">EMACITY MUN</span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-xs font-medium tracking-[0.2em] text-slate-400">
                <a href="#about" class="hover:text-amber-400 transition-colors">ABOUT</a>
                <a href="#committees" class="hover:text-amber-400 transition-colors">COMMITTEES</a>
                <a href="#gallery" class="hover:text-amber-400 transition-colors">GALLERY</a>
                <a href="#register" class="bg-gradient-to-r from-amber-600 to-amber-500 text-slate-950 px-5 py-2.5 rounded font-bold tracking-widest shadow-lg shadow-amber-500/10 hover:brightness-110 transition-all">REGISTER</a>
            </div>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-950/20 via-[#030712] to-[#030712]">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b08_1px,transparent_1px),linear-gradient(to_bottom,#1e293b08_1px,transparent_1px)] bg-[size:4rem_4rem]"></div>
        
        <div class="relative max-w-5xl mx-auto px-6 flex flex-col items-center text-center z-10">
            <div class="relative w-32 h-32 md:w-36 md:h-36 rounded-full bg-slate-900/90 border border-amber-500/30 flex items-center justify-center p-3 shadow-2xl mb-8 overflow-hidden">
                <img src="logo.png" alt="Emacity MUN Crest" class="w-full h-full object-contain">
            </div>

            <p class="text-xs font-bold tracking-[0.4em] text-amber-500 mb-3 uppercase font-sans">The Pune Chapter</p>
            <h1 class="font-serif text-4xl md:text-6xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-b from-slate-100 via-slate-200 to-slate-400 max-w-3xl leading-tight mb-6">
                Diplomacy. Leadership. Legacy.
            </h1>
            <div class="w-16 h-[1px] bg-gradient-to-r from-transparent via-amber-500/50 to-transparent mb-8"></div>
            <p class="text-sm md:text-base text-slate-400 max-w-xl font-light tracking-wide leading-relaxed mb-10">
                Join exceptional minds across the circuit to debate, negotiate, and resolve global crises. Your seat at the table awaits.
            </p>
            <a href="#register" class="bg-gradient-to-r from-amber-600 to-amber-500 text-slate-950 px-8 py-3.5 rounded font-bold text-xs tracking-[0.2em] shadow-xl shadow-amber-500/10 hover:scale-[1.02] transition-all">SECURE YOUR DELEGATION</a>
        </div>
    </section>

    <section id="gallery" class="py-24 border-t border-blue-950/30 bg-[#020610]">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col items-center text-center mb-16">
                <h2 class="font-serif text-2xl md:text-3xl tracking-wider text-slate-200 mb-3">CONFERENCE GALLERY</h2>
                <div class="w-12 h-0.5 bg-amber-500/40"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo1.JPG" alt="Committee Session" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo2.JPG" alt="Debate Floor" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo3.JPG" alt="Executive Board" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo4.JPG" alt="Assembly Hall" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo5.JPG" alt="Awards Distribution" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
                <div class="overflow-hidden rounded-lg border border-blue-950/40 bg-slate-900/20 p-2 shadow-md hover:border-amber-500/20 transition-all duration-300 group">
                    <img src="photo6.JPG" alt="Closing Ceremony" class="aspect-video w-full object-cover rounded-md group-hover:scale-[1.03] transition-transform duration-500">
                </div>
            </div>
        </div>
    </section>

</body>
</html>
